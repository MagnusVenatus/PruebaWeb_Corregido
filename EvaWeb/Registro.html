<body class="ColorFondo">
    <div class="Centrar"> Formulario Ingreso</div>
    <form>
        <div>
        <label for="Nombre">Nombre Completo</label>
        <input type="text" id="Nombre" name="Nombre" required>
        </div>
        <div>
        <label for="FechaN">Fecha Nacimiento</label>
        <input type="datetime" name="FechaN" id="FechaN" required>
        </div>
        <div>
        <label for="Correo">Correo electronico</label>
        <input type="email" name="Correo" id="Correo" required>
        </div>
        <div>
        <label for="Sexo">Sexo</label>
        <select name="Sexo" id="Sexo" required>
            <option value="M">M</option>
            <option value="F">F</option>
            <option value="O">O</option>
        </select>
        </div>
        <div>
        <label for="ed">Edad "Mental"</label>
        <input type="number" name="ed" id="ed" required>
        </div>
        <div>
        <label for="Img">Foto de usted</label>
        <input type="file" name="Img" id="Img" required>
        </div>
        <div>
        <label for="col">Color Favorito</label>
        <input type="color" name="col" id="col" required>
        </div>
    </form>
    <div>
    <input type="submit" class="ColorT" value="Enviar">
    </div>
